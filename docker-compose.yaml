# docker-compose.yaml — stack binance na Contabo (Coolify-prod, amd64 nativo).
# (nome padrão p/ o build pack Docker Compose do Coolify achar o arquivo no repo.)
#
# Tudo INTERNO por padrão: o operador interage pelo Telegram (o gateway conecta
# OUT) e o estrategista executa ordens via betrader REST API (sem MCP de trading).
# EXCEÇÃO (F1): o webhook-shim recebe POSTs INBOUND (betrader sentinela +
# self-trigger de drawdown). Exige ingress público → gateway:8645 configurado no
# Coolify (domínio/Traefik na UI). WEBHOOK_PUBLIC_URL deve apontar pra esse host.
#
# Env vars: cadastradas no Coolify env tab (NÃO no .env, que é gitignored e não
# está no repo). Lidas do hermes/.env local e injetadas via MCP no deploy:
#   gateway:      MINIMAX_API_KEY, OPENROUTER_API_KEY,
#                 TELEGRAM_BOT_TOKEN, TELEGRAM_ALLOWED_USERS, TELEGRAM_HOME_CHANNEL,
#                 BETRADER_USER, EXECUTION_MODE, EMERGENCY_STOP, INITIAL_EQUITY,
#                 GATEWAY_URL, GATEWAY_TOKEN, WEBHOOK_SECRET, GITHUB_TOKEN
#   risk-gateway: BETRADER_BASE_URL, BETRADER_TOKEN, BETRADER_USER,
#                 EXECUTION_MODE, EMERGENCY_STOP, INITIAL_EQUITY,
#                 SYMBOL, TIMEFRAME, BRIEF_CACHE_TTL_SECONDS,
#                 GATEWAY_TOKEN, WEBHOOK_PUBLIC_URL, BETRADER_WEBHOOK_SECRET
#   webhook-shim: BETRADER_WEBHOOK_SECRET
#
# Isolamento (F2): o risk-gateway roda scripts+dogmas BAKED na imagem (sem
# volume compartilhado — o agente não pode editar o código/constituição que o
# gate executa) e usa o risk-redis na rede `risk` (brief cache, financial_state
# e decisões inforjáveis: o agente não alcança esse Redis).

services:
  # Risk Gateway (F2): detém BETRADER_TOKEN; gate + execução de ordens via betrader REST.
  risk-gateway:
    build:
      context: .
      dockerfile: Dockerfile
      target: vps
    command: ["sh", "-c", "python scripts/risk_gateway.py"]
    working_dir: /opt/data
    restart: unless-stopped
    depends_on:
      risk-redis:
        condition: service_healthy
    environment:
      HERMES_DATA_DIR: /opt/data
      REDIS_HOST: risk-redis
      REDIS_PORT: "6379"
      # secrets (Coolify env tab)
      BETRADER_BASE_URL: ${BETRADER_BASE_URL}
      BETRADER_TOKEN: ${BETRADER_TOKEN}
      BETRADER_USER: ${BETRADER_USER}
      EXECUTION_MODE: ${EXECUTION_MODE}
      EMERGENCY_STOP: ${EMERGENCY_STOP}
      INITIAL_EQUITY: ${INITIAL_EQUITY}
      SYMBOL: ${SYMBOL}
      TIMEFRAME: ${TIMEFRAME}
      BRIEF_CACHE_TTL_SECONDS: ${BRIEF_CACHE_TTL_SECONDS}
      GATEWAY_TOKEN: ${GATEWAY_TOKEN}
      WEBHOOK_PUBLIC_URL: ${WEBHOOK_PUBLIC_URL}
      BETRADER_WEBHOOK_SECRET: ${BETRADER_WEBHOOK_SECRET}
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://127.0.0.1:8647/health', timeout=3).status == 200 else 1)"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    # SEM volume: scripts/ e dogmas.yaml vêm baked da imagem (target vps).
    # Estado financeiro/brief vivem no risk-redis — nada a persistir em disco.
    networks:
      - binance
      - risk

  # Hermes agent (binance). Data dir baked na imagem (target vps); volume semeia dele.
  gateway:
    build:
      context: .
      dockerfile: Dockerfile
      target: vps
    command: ["sh", "-c", "python /opt/data/scripts/gh_auth.py; exec hermes gateway run"]
    restart: unless-stopped
    depends_on:
      binance-redis:
        condition: service_healthy
      risk-gateway:
        condition: service_started
    environment:
      HERMES_DATA_DIR: /opt/data
      REDIS_HOST: binance-redis
      REDIS_PORT: "6379"
      # secrets (Coolify env tab)
      MINIMAX_API_KEY: ${MINIMAX_API_KEY}
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN}
      TELEGRAM_ALLOWED_USERS: ${TELEGRAM_ALLOWED_USERS}
      TELEGRAM_HOME_CHANNEL: ${TELEGRAM_HOME_CHANNEL}
      BETRADER_USER: ${BETRADER_USER}
      EXECUTION_MODE: ${EXECUTION_MODE}
      EMERGENCY_STOP: ${EMERGENCY_STOP}
      INITIAL_EQUITY: ${INITIAL_EQUITY}
      GATEWAY_URL: "http://risk-gateway:8647"
      GATEWAY_TOKEN: ${GATEWAY_TOKEN}
      # Webhook nativo do engine (F1): loopback-only :8646, alvo do forward do shim.
      WEBHOOK_ENABLED: "true"
      WEBHOOK_PORT: "8646"
      WEBHOOK_SECRET: ${WEBHOOK_SECRET}
      GITHUB_TOKEN: ${GITHUB_TOKEN}
    volumes:
      - hermes-data:/opt/data
    networks:
      - binance
      - coolify
    # Ingress público (F1): Traefik (rede coolify) roteia o domínio → :8645 do shim,
    # que roda neste netns. betrader/drawdown-wake POSTam em /hook/betrader. TLS via LE.
    labels:
      - traefik.enable=true
      - traefik.docker.network=coolify
      - "traefik.http.routers.binance-hook.rule=Host(`hermes-binance.fabiosiqueira.dev`)"
      - traefik.http.routers.binance-hook.entrypoints=https
      - traefik.http.routers.binance-hook.tls=true
      - traefik.http.routers.binance-hook.tls.certresolver=letsencrypt
      - traefik.http.routers.binance-hook.service=binance-hook
      - traefik.http.services.binance-hook.loadbalancer.server.port=8645
    # Liveness do engine: webhook nativo loopback-only :8646 (WEBHOOK_ENABLED=true).
    healthcheck:
      test: ["CMD", "python", "-c", "import socket; socket.create_connection(('127.0.0.1', 8646), 3).close()"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 60s

  # Webhook shim (F1): recebe POST do betrader/drawdown-wake na :8645 (/hook/betrader),
  # verifica X-Beholder-Signature e re-assina pro esquema Generic do engine nativo
  # (127.0.0.1:8646). Sidecar do gateway: compartilha netns pra alcançar o loopback do
  # engine e publicar a :8645 pelo mesmo processo. scripts/ baked na imagem (target vps).
  webhook-shim:
    build:
      context: .
      dockerfile: Dockerfile
      target: vps
    command: ["sh", "-c", "python scripts/webhook_shim.py"]
    working_dir: /opt/data
    network_mode: "service:gateway"
    environment:
      HERMES_DATA_DIR: /opt/data
      BETRADER_WEBHOOK_SECRET: ${BETRADER_WEBHOOK_SECRET}
    depends_on:
      - gateway
    # Liveness do shim: porta pública :8645 no netns do gateway (GET dá 405, mas prova vivo).
    healthcheck:
      test: ["CMD", "python", "-c", "import socket; socket.create_connection(('127.0.0.1', 8645), 3).close()"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 60s

  # Renomeado de `redis` p/ nome ÚNICO: o gateway entra na rede `coolify` (Traefik),
  # onde o `coolify-redis` também responde pelo alias `redis` (com requirepass) e
  # sequestrava a resolução DNS → agente escrevia no redis errado (auth) e perdia
  # mulham/proposal silenciosamente. Nome único elimina a colisão.
  binance-redis:
    image: redis:7-alpine
    command: ["redis-server", "--appendonly", "yes"]
    restart: unless-stopped
    volumes:
      - binance-redis-data:/data
    networks:
      - binance
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  # Redis PRIVADO do risk-gateway (rede `risk`, fora do alcance do agente):
  # brief cache, financial_state e stream de decisões.
  risk-redis:
    image: redis:7-alpine
    command: ["redis-server", "--appendonly", "yes"]
    restart: unless-stopped
    volumes:
      - binance-risk-redis-data:/data
    networks:
      - risk
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

networks:
  binance:
    driver: bridge
  risk:
    driver: bridge
  # Rede do Traefik do Coolify (externa) — só o gateway entra nela, p/ o proxy
  # alcançar o shim na :8645 e publicar o domínio.
  coolify:
    external: true

volumes:
  hermes-data:
  binance-redis-data:
  binance-risk-redis-data:
